<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | Luminara Gems</title>
  <meta name="robots" content="noindex"/>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    :root{--obsidian:#07070f;--gold:#c9a84c;--gold-dim:#a8893c;--white:#f5f2eb;--muted:rgba(245,242,235,.55)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--obsidian);color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
    .err-gem{font-size:5rem;margin-bottom:16px;filter:drop-shadow(0 0 24px rgba(201,168,76,.35));}
    .err-code{font-family:'Cinzel',serif;font-size:clamp(5rem,15vw,10rem);font-weight:400;color:var(--gold);line-height:1;opacity:.18;position:absolute;left:50%;transform:translateX(-50%);}
    .err-wrap{position:relative;margin-bottom:12px;height:clamp(80px,15vw,120px);display:flex;align-items:center;justify-content:center;width:100%;}
    .err-label{font-family:'Cinzel',serif;font-size:clamp(.6rem,2vw,.8rem);letter-spacing:.4em;text-transform:uppercase;color:var(--gold);position:relative;z-index:2;}
    h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,4vw,2.8rem);font-weight:300;margin-bottom:16px;line-height:1.2;}
    p{font-size:.8rem;color:var(--muted);max-width:440px;line-height:1.8;margin-bottom:40px;}
    .btn-gold{display:inline-block;padding:13px 32px;background:var(--gold);color:var(--obsidian);font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;transition:background .25s;}
    .btn-gold:hover{background:var(--gold-dim);}
    .btn-outline{display:inline-block;padding:12px 32px;border:1px solid rgba(201,168,76,.4);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:.68rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;margin-left:16px;transition:border-color .25s;}
    .btn-outline:hover{border-color:var(--gold);}
    .divider{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);margin:48px auto;}
    .quick-links{display:flex;flex-wrap:wrap;gap:12px 24px;justify-content:center;max-width:500px;}
    .ql{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .25s;}
    .ql:hover{color:var(--gold);}
    .logo-wrap{margin-bottom:48px;}
    .logo-wrap img{height:52px;object-fit:contain;}
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img src="images/logo-luminara.jpg" alt="Luminara Gems" onerror="this.style.display='none'"/>
  </div>

  <div class="err-wrap">
    <span class="err-code">404</span>
    <span class="err-label">Page Not Found</span>
  </div>

  <div class="err-gem">💎</div>

  <h1>This gem has gone underground</h1>
  <p>The page you're looking for may have moved, been renamed, or never existed. Let us guide you back to the collection.</p>

  <div>
    <a href="index.html" class="btn-gold">Return Home</a>
    <a href="vault.html" class="btn-outline">Explore The Vault</a>
  </div>

  <div class="divider"></div>

  <div class="quick-links">
    <a href="gemstone-safaris.html" class="ql">Gem Safaris</a>
    <a href="about.html" class="ql">About</a>
    <a href="gallery.html" class="ql">Gallery</a>
    <a href="journal.html" class="ql">Journal</a>
    <a href="sanaa-chains.html" class="ql">Sanaa Chains</a>
    <a href="contact.html" class="ql">Contact</a>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
